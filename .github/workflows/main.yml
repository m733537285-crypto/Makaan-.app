name: Build Makaan APK/AAB

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Verify google-services.json is present
        run: |
          if [ ! -f android/app/google-services.json ]; then
            echo "ERROR: android/app/google-services.json is missing." >&2
            echo "Add your Firebase Android config file at android/app/google-services.json before building." >&2
            exit 1
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Static analysis
        run: flutter analyze
        continue-on-error: true

      - name: Run tests
        run: flutter test
        continue-on-error: true

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Build release APK (debug-signed if no keystore provided)
        run: flutter build apk --release

      - name: Build release AAB (debug-signed if no keystore provided)
        run: flutter build appbundle --release
        continue-on-error: true

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: makaan-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: warn

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: makaan-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: warn

      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: makaan-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: warn
