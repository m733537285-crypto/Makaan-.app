name: makaan
description: Phase 12 production-ready Makaan platform with Firebase release configuration.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.12.0 <4.0.0'

dependencies:
  cupertino_icons: ^1.0.8
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cloud_firestore: ^6.6.0
  firebase_auth: ^6.5.1
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.1
  firebase_storage: ^13.4.1
  flutter_secure_storage: ^9.2.4
  http: ^1.2.2
  image: ^4.3.0
  flutter_svg: ^2.2.1
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/brand/
    - assets/icons/
    - assets/images/
  fonts:
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal-Regular.ttf
        - asset: assets/fonts/Tajawal-Medium.ttf
          weight: 500
        - asset: assets/fonts/Tajawal-Bold.ttf
          weight: 700
